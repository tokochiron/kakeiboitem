<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>家計管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>家計簿</h2>

<input id="date" type="date">
<input id="amount" type="number" placeholder="金額">
<input id="note" type="text" placeholder="メモ">
<button onclick="add()">追加</button>

<ul id="list"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVSlhKVSYWexghC7ZucFhGCTjhs6LXcYQ",
  authDomain: "kakeibo-957ed.firebaseapp.com",
  projectId: "kakeibo-957ed",
  storageBucket: "kakeibo-957ed.firebasestorage.app",
  messagingSenderId: "323226191838",
  appId: "1:323226191838:web:7a746470fe5283f2ecbf4f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let state = [];

// 追加
window.add = function() {
  const date = document.getElementById("date").value;
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;

  state.push({ date, amount, note });
  render();
  save();
}

// 表示
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  state.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.date} ¥${item.amount} ${item.note}`;
    list.appendChild(li);
  });
}

// 保存
async function save() {
  await setDoc(doc(db, "kakeibo", "main"), {
    data: state
  });
}

// 読み込み
async function load() {
  const snap = await getDoc(doc(db, "kakeibo", "main"));
  if (snap.exists()) {
    state = snap.data().data || [];
    render();
  }
}

await load();

</script>

</body>
</html>
